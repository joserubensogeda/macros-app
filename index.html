<style>
:root{
  --bg:#f8fafc; --card:#fff; --text:#0f172a; --muted:#64748b;
  --border:#e2e8f0; --border2:#cbd5e1; --accent:#0d9488; --accent2:#0f766e;
  --accent-l:#ccfbf1; --p:#dc2626; --c:#d97706; --g:#7c3aed;
  --green:#16a34a; --green-l:#dcfce7; --amber:#d97706;
  --shadow:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
  --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;padding:calc(var(--safe-t) + 8px) 0 calc(var(--safe-b) + 30px);}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;padding:0;font-size:inherit;}

/* HEADER */
.hdr{padding:8px 16px 4px;display:flex;align-items:center;justify-content:space-between;}
.hdr h1{font-size:20px;font-weight:800;margin:0;letter-spacing:-0.5px;}
.hdr .sub{font-size:12px;color:var(--muted);font-weight:600;}

/* DAY PILLS */
.days{display:flex;gap:6px;padding:8px 16px 4px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.days::-webkit-scrollbar{display:none;}
.day-pill{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:8px 14px;font-size:13px;font-weight:700;white-space:nowrap;color:var(--muted);box-shadow:var(--shadow);}
.day-pill.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.day-pill.today::after{content:'•';margin-left:4px;color:var(--green);}
.day-pill.active.today::after{color:#fff;}

/* SUMMARY */
.summary{padding:6px 16px 4px;}
.sum-card{background:var(--card);border-radius:16px;padding:14px 16px;box-shadow:var(--shadow);}
.sum-day-name{font-size:15px;font-weight:800;}
.sum-day-sub{font-size:12px;color:var(--accent);font-weight:600;margin-bottom:10px;}
.sum-kcal-row{display:flex;justify-content:space-between;align-items:baseline;}
.sum-kcal{font-size:26px;font-weight:800;letter-spacing:-1px;}
.sum-kcal small{font-size:13px;color:var(--muted);font-weight:600;}
.sum-target{font-size:12px;color:var(--muted);font-weight:600;}
.bar{height:7px;background:var(--border);border-radius:4px;overflow:hidden;margin:8px 0 10px;}
.bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .3s;}
.macros{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.macro{text-align:center;}
.macro .lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.macro.p .lbl{color:var(--p);} .macro.c .lbl{color:var(--c);} .macro.g .lbl{color:var(--g);}
.macro .val{font-size:18px;font-weight:800;margin-top:1px;}
.macro .tgt{font-size:10px;color:var(--muted);}
.kcal-hd{display:flex;justify-content:space-between;align-items:baseline;margin-top:6px;}
.kcal-lbl{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.5px;}
.kcal-rest{font-size:12px;font-weight:700;color:var(--accent2);}
.kcal-rest.over{color:var(--p);}
.kcal-big{font-weight:800;letter-spacing:-1px;margin:2px 0 8px;}
.kcal-big #day-kcal{font-size:32px;}
.kcal-big .kcal-sep{color:var(--muted);font-weight:300;font-size:20px;}
.kcal-big .kcal-tgt{color:var(--muted);font-size:18px;font-weight:600;}
.kcal-big .kcal-unit{color:var(--muted);font-size:12px;font-weight:600;}
.mbar{height:4px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden;}
.mbar-fill{height:100%;border-radius:2px;transition:width .3s;}
.mbar-fill.p-fill{background:var(--p);} .mbar-fill.c-fill{background:var(--c);} .mbar-fill.g-fill{background:var(--g);}
.plan-note{font-size:11px;color:var(--muted);text-align:center;margin-top:10px;}
.plan-note b{color:var(--text);}

.consumed-note{font-size:11px;color:var(--muted);margin-top:8px;text-align:center;}
.consumed-note b{color:var(--accent2);}

/* MEALS */
.meals{padding:8px 16px 0;}
.meal{background:var(--card);border-radius:14px;box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden;}
.meal-hd{display:flex;align-items:center;gap:8px;padding:11px 14px 8px;}
.meal-time{font-size:11px;font-weight:800;color:var(--accent);background:var(--accent-l);padding:2px 8px;border-radius:10px;}
.meal-name{font-size:14px;font-weight:700;flex:1;}
.meal-kcal{font-size:12px;font-weight:700;color:var(--muted);}
.items{padding:0 8px 8px;}
.item{display:flex;align-items:center;gap:8px;padding:8px 6px;border-top:1px solid var(--border);}
.item:first-child{border-top:none;}
.chk{width:24px;height:24px;border-radius:7px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:#fff;transition:all .15s;}
.chk.on{background:var(--green);border-color:var(--green);}
.item-info{flex:1;min-width:0;}
.item-name{font-size:13.5px;font-weight:600;}
.item.eaten .item-name{text-decoration:line-through;color:var(--muted);}
.item-qty{font-size:11.5px;color:var(--muted);}
.item-macros{font-size:10.5px;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:1px;}
.item-kcal{font-size:13px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;flex-shrink:0;}
.swap-btn{flex-shrink:0;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:5px 9px;font-size:11px;font-weight:700;color:var(--accent2);display:flex;align-items:center;gap:3px;}
.swap-btn:active{background:var(--accent-l);}
.swap-btn.locked{opacity:0;pointer-events:none;}

/* SWAP SHEET */
.backdrop{position:fixed;inset:0;background:rgba(15,23,42,.5);display:none;z-index:100;}
.backdrop.show{display:block;}
@keyframes up{from{transform:translateY(100%);}to{transform:translateY(0);}}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-radius:20px 20px 0 0;max-height:80vh;display:none;flex-direction:column;z-index:101;padding-bottom:var(--safe-b);animation:up .25s ease;}
.sheet.show{display:flex;}
.handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:8px auto 0;}
.sheet-hd{padding:12px 16px 4px;display:flex;align-items:center;justify-content:space-between;}
.sheet-title{font-size:17px;font-weight:800;}
.sheet-sub{font-size:12px;color:var(--muted);padding:0 16px 8px;}
.sheet-close{font-size:26px;color:var(--muted);width:32px;height:32px;line-height:1;}
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 16px;}
.opt{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.opt.current{border-color:var(--accent);background:var(--accent-l);}
.opt-info{flex:1;min-width:0;}
.opt-name{font-size:14px;font-weight:700;}
.opt-qty{font-size:11.5px;color:var(--muted);}
.opt-macros{font-size:10.5px;color:var(--muted);margin-top:1px;}
.opt-kcal{font-size:15px;font-weight:800;color:var(--accent2);flex-shrink:0;}
.opt-tag{font-size:9px;font-weight:800;color:var(--accent);text-transform:uppercase;}
.opt-delta{display:inline-block;font-size:10.5px;font-weight:700;margin-top:3px;}
.opt-delta.cur{color:var(--accent);} .opt-delta.up{color:var(--amber);} .opt-delta.down{color:var(--green);}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--safe-b) + 16px);left:50%;transform:translateX(-50%) translateY(100px);background:var(--text);color:#fff;padding:11px 20px;border-radius:22px;font-size:14px;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;z-index:200;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* RESET BTN */
.actions{padding:4px 16px 0;display:flex;gap:8px;}
.act-btn{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px;font-size:12px;font-weight:700;color:var(--muted);box-shadow:var(--shadow);}
.act-btn:active{background:var(--bg);}

/* WATER */
.water{padding:8px 16px 0;}
.water-card{background:var(--card);border-radius:16px;padding:14px 16px;box-shadow:var(--shadow);}
.water-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.water-lbl{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.5px;}
.water-amt{font-size:20px;font-weight:800;letter-spacing:-.5px;margin-top:2px;}
.water-tgt{font-size:13px;color:var(--muted);font-weight:600;}
.water-rest{font-size:12px;font-weight:700;color:#0284c7;}
.water-rest.done{color:var(--green);}
.bar-fill.water-bar{background:#0ea5e9;}
.water-cups{display:flex;flex-wrap:wrap;gap:5px;margin:10px 0;}
.cup{width:26px;height:32px;border-radius:4px 4px 7px 7px;border:2px solid #bae6fd;background:#f0f9ff;position:relative;overflow:hidden;}
.cup.full{background:#0ea5e9;border-color:#0ea5e9;}
.water-actions{display:flex;gap:8px;}
.water-btn{flex:1;background:#0ea5e9;color:#fff;border-radius:10px;padding:11px;font-size:14px;font-weight:700;}
.water-btn:active{background:#0284c7;}
.water-btn.ghost{flex:0 0 52px;background:var(--bg);color:var(--muted);border:1px solid var(--border);font-size:18px;}
</style>
</head>

<div class="hdr">

  </div>
</div>

<div class="days" id="days"></div>

<div class="summary">

      <div class="macro g"><div class="lbl">Gordura</div><div class="val" id="day-g">0g</div><div class="tgt">de <span id="tgt-g">49</span>g</div><div class="mbar"><div class="mbar-fill g-fill" id="bar-g" style="width:0%"></div></div></div>
    </div>

</div>

<div class="water">

      </div>

    </div>
    <div class="bar"><div class="bar-fill water-bar" id="water-bar" style="width:0%"></div></div>
    <div class="water-cups" id="water-cups"></div>
    <div class="water-actions">
      <button class="water-btn" id="water-add">+ 1 copo (250ml)</button>
      <button class="water-btn ghost" id="water-remove">−</button>
    </div>
  </div>
</div>

<div class="actions">
  <button class="act-btn" id="btn-uncheck">Desmarcar tudo do dia</button>
  <button class="act-btn" id="btn-reset">Voltar refeições ao padrão</button>
</div>

<div class="meals" id="meals"></div>

<div class="backdrop" id="backdrop"></div>
<div class="sheet" id="sheet">
  <div class="handle"></div>
  <div class="sheet-hd">
    <span class="sheet-title" id="sheet-title">Trocar</span>
    <button class="sheet-close" id="sheet-close">×</button>
  </div>
  <div class="sheet-sub" id="sheet-sub">Escolha uma opção com macro parecido</div>
  <div class="sheet-body" id="sheet-body"></div>
</div>

<div class="toast" id="toast">Trocado!</div>

    {name:'Creatina', qty:'3-5g (qualquer hora)', kcal:0, p:0, c:0, g:0},

function fixed(name, qty, kcal, p, c, g){ return {fixed:{name,qty,kcal,p,c,g}}; }

const DAY_IDS = ['seg','ter','qua','qui','sex','sab','dom'];
const TARGET = { kcal:2200, p:220, c:220, g:49 };
// meta de agua por dia (ml). Sabado (goleiro no sol) e maior.
const WATER_GOAL = { seg:3500, ter:3500, qua:3500, qui:3500, sex:3500, sab:4500, dom:3000 };
const CUP = 250; // ml por copo
const STORE = 'dieta_v1';

// state: { sel:{dayId:{'m-i':poolIndex}}, eat:{dayId:{'m-i':true}}, water:{dayId:ml} }
let state = { sel:{}, eat:{}, water:{} };
let currentDay = todayId();

function todayId(){
  const d = new Date().getDay(); // 0=dom
  return ['dom','seg','ter','qua','qui','sex','sab'][d];
}

function load(){
  try{ const r=localStorage.getItem(STORE); if(r){ const p=JSON.parse(r); state.sel=p.sel||{}; state.eat=p.eat||{}; state.water=p.water||{}; } }catch(e){}
}
function save(){
  try{ localStorage.setItem(STORE, JSON.stringify(state)); }catch(e){}
}

// resolve item -> food object
function resolveItem(dayId, mi, ii, item){
  if(item.fixed) return item.fixed;
  const key = mi+'-'+ii;
  const sel = (state.sel[dayId]||{})[key];
  const idx = (sel!=null) ? sel : item.def;
  return POOLS[item.pool][idx];
}

function isEaten(dayId, mi, ii){
  return !!((state.eat[dayId]||{})[mi+'-'+ii]);
}

function fmt(n){ return Number(n.toFixed(0)).toLocaleString('pt-BR'); }
function fmtM(n){ return (n<10 && n%1!==0) ? Number(n.toFixed(1)).toLocaleString('pt-BR') : Math.round(n).toString(); }
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// mostra "faltam Xg" ou "passou Xg" para cada macro
// proteina: passar da meta e bom (verde); faltar e amarelo
// carbo/gordura: passar e alerta (vermelho/ambar); faltar e neutro
function setRem(elId, cur, tgt, type){
  const el=document.getElementById(elId);
  const d=tgt-cur;
  if(type==='p'){
    if(d>0){ el.textContent='faltam '+fmtM(d)+'g'; el.className='rem warn'; }
    else { el.textContent='meta batida'; el.className='rem good'; }
  } else {
    if(d>=0){ el.textContent='faltam '+fmtM(d)+'g'; el.className='rem under'; }
    else { el.textContent='passou '+fmtM(-d)+'g'; el.className='rem over'; }
  }
}

function dayTotals(dayId){
  const day = PLAN[dayId];
  let plan={kcal:0,p:0,c:0,g:0}, eaten={kcal:0,p:0,c:0,g:0};
  day.meals.forEach((m,mi)=>m.items.forEach((item,ii)=>{
    const f=resolveItem(dayId,mi,ii,item);
    plan.kcal+=f.kcal; plan.p+=f.p; plan.c+=f.c; plan.g+=f.g;
    if(isEaten(dayId,mi,ii)){ eaten.kcal+=f.kcal; eaten.p+=f.p; eaten.c+=f.c; eaten.g+=f.g; }
  }));
  return {plan,eaten};
}

// ============ RENDER ============
function renderDays(){
  const wrap=document.getElementById('days');
  wrap.innerHTML=DAY_IDS.map(id=>{
    const t=id===todayId()?'today':'';
    const a=id===currentDay?'active':'';
    return `<button class="day-pill ${a} ${t}" data-day="${id}">${PLAN[id].label}</button>`;
  }).join('');
  wrap.querySelectorAll('.day-pill').forEach(b=>b.addEventListener('click',()=>{currentDay=b.dataset.day;render();}));
}

function render(){
  renderDays();
  const day=PLAN[currentDay];
  document.getElementById('day-name').textContent=day.name;
  document.getElementById('day-sub').textContent=day.sub;

  const {plan,eaten}=dayTotals(currentDay);
  const T=TARGET;
  // numero grande e macros = CONSUMIDO (vai preenchendo conforme marca)
  document.getElementById('day-kcal').textContent=fmt(eaten.kcal);
  document.getElementById('tgt-kcal').textContent=fmt(T.kcal);
  document.getElementById('day-p').textContent=fmtM(eaten.p)+'g';
  document.getElementById('day-c').textContent=fmtM(eaten.c)+'g';
  document.getElementById('day-g').textContent=fmtM(eaten.g)+'g';
  document.getElementById('tgt-p').textContent=fmt(T.p);
  document.getElementById('tgt-c').textContent=fmt(T.c);
  document.getElementById('tgt-g').textContent=fmt(T.g);
  document.getElementById('kcal-bar').style.width=Math.min(100,(eaten.kcal/T.kcal)*100)+'%';
  document.getElementById('bar-p').style.width=Math.min(100,(eaten.p/T.p)*100)+'%';
  document.getElementById('bar-c').style.width=Math.min(100,(eaten.c/T.c)*100)+'%';
  document.getElementById('bar-g').style.width=Math.min(100,(eaten.g/T.g)*100)+'%';

  // restantes de caloria
  const rest=T.kcal-eaten.kcal;
  const rEl=document.getElementById('kcal-rest');
  if(rest>=0){ rEl.textContent=fmt(rest)+' restantes'; rEl.className='kcal-rest'; }
  else { rEl.textContent='passou '+fmt(-rest); rEl.className='kcal-rest over'; }

  // nota do plano do dia (feedback ao trocar itens)
  const pd=T.kcal-plan.kcal;
  const pn=document.getElementById('plan-note');
  if(pd>=0){ pn.innerHTML='Plano completo do dia: <b>'+fmt(plan.kcal)+' kcal</b> · faltam '+fmt(pd)+' p/ meta'; }
  else { pn.innerHTML='Plano completo do dia: <b>'+fmt(plan.kcal)+' kcal</b> · passou '+fmt(-pd)+' da meta'; }
  const kbar=document.getElementById('kcal-bar');
  kbar.style.background = (rest<0) ? 'var(--p)' : 'var(--accent)';

  renderWater();

  const meals=document.getElementById('meals');
  meals.innerHTML=day.meals.map((m,mi)=>{
    let mealKcal=0;
    const itemsHtml=m.items.map((item,ii)=>{
      const f=resolveItem(currentDay,mi,ii,item);
      mealKcal+=f.kcal;
      const eaten=isEaten(currentDay,mi,ii);
      const canSwap=!item.fixed && POOLS[item.pool].length>1;
      return `<div class="item ${eaten?'eaten':''}">
        <button class="chk ${eaten?'on':''}" data-eat="${mi}-${ii}">${eaten?'✓':''}</button>
        <div class="item-info">
          <div class="item-name">${esc(f.name)}</div>
          <div class="item-qty">${esc(f.qty)}</div>
          <div class="item-macros">P ${fmtM(f.p)} · C ${fmtM(f.c)} · G ${fmtM(f.g)}</div>
        </div>
        <div class="item-kcal">${fmt(f.kcal)}</div>
        <button class="swap-btn ${canSwap?'':'locked'}" data-swap="${mi}-${ii}" data-pool="${item.pool||''}">⇄ Trocar</button>
      </div>`;
    }).join('');
    return `<div class="meal">
      <div class="meal-hd">
        <span class="meal-time">${m.time}</span>
        <span class="meal-name">${esc(m.name)}</span>
        <span class="meal-kcal">${fmt(mealKcal)} kcal</span>
      </div>
      <div class="items">${itemsHtml}</div>
    </div>`;
  }).join('');

  meals.querySelectorAll('[data-eat]').forEach(b=>b.addEventListener('click',()=>toggleEat(b.dataset.eat)));
  meals.querySelectorAll('[data-swap]').forEach(b=>{
    if(b.classList.contains('locked'))return;
    b.addEventListener('click',()=>openSwap(b.dataset.swap,b.dataset.pool));
  });
}

// ============ ÁGUA ============
function waterGoal(){ return WATER_GOAL[currentDay] || 3500; }
function waterMl(){ return (state.water[currentDay]||0); }

function renderWater(){
  const goal=waterGoal(), ml=waterMl();
  document.getElementById('water-ml').textContent=fmt(ml);
  document.getElementById('water-goal').textContent=fmt(goal);
  document.getElementById('water-bar').style.width=Math.min(100,(ml/goal)*100)+'%';
  const rest=goal-ml;
  const rEl=document.getElementById('water-rest');
  if(rest>0){ rEl.textContent='faltam '+(rest/1000).toLocaleString('pt-BR',{maximumFractionDigits:2})+'L'; rEl.className='water-rest'; }
  else { rEl.textContent='meta batida! '+(ml/1000).toLocaleString('pt-BR',{maximumFractionDigits:2})+'L'; rEl.className='water-rest done'; }
  // copos visuais
  const totalCups=Math.ceil(goal/CUP);
  const fullCups=Math.round(ml/CUP);
  let html='';
  for(let i=0;i<totalCups;i++){ html+=`<div class="cup ${i<fullCups?'full':''}"></div>`; }
  document.getElementById('water-cups').innerHTML=html;
}

function addWater(){
  if(!state.water[currentDay]) state.water[currentDay]=0;
  state.water[currentDay]+=CUP;
  save(); renderWater(); toast('+250ml 💧');
}
function removeWater(){
  if(!state.water[currentDay]) return;
  state.water[currentDay]=Math.max(0,state.water[currentDay]-CUP);
  if(state.water[currentDay]===0) delete state.water[currentDay];
  save(); renderWater();
}

function toggleEat(key){
  if(!state.eat[currentDay]) state.eat[currentDay]={};
  state.eat[currentDay][key]=!state.eat[currentDay][key];
  if(!state.eat[currentDay][key]) delete state.eat[currentDay][key];
  save(); render();
}

// ============ SWAP SHEET ============
let swapCtx=null;
function openSwap(key,poolId){
  swapCtx={key,poolId};
  const pool=POOLS[poolId];
  const [mi,ii]=key.split('-').map(Number);
  const item=PLAN[currentDay].meals[mi].items[ii];
  const sel=(state.sel[currentDay]||{})[key];
  const curIdx=(sel!=null)?sel:item.def;
  const curFood = pool[curIdx];
  document.getElementById('sheet-title').textContent='Trocar item';
  document.getElementById('sheet-sub').textContent='O número em cinza mostra quanto muda no dia. Toque para trocar.';
  document.getElementById('sheet-body').innerHTML=pool.map((f,idx)=>{
    let delta='';
    if(idx===curIdx){ delta='<span class="opt-delta cur">• atual</span>'; }
    else {
      const dk=f.kcal-curFood.kcal;
      const dp=f.p-curFood.p;
      const sign=dk>0?'+':'';
      const psign=dp>0?'+':'';
      const cls=dk>0?'up':(dk<0?'down':'');
      delta=`<span class="opt-delta ${cls}">${sign}${fmt(dk)} kcal · ${psign}${fmtM(dp)}g P</span>`;
    }
    return `
    <div class="opt ${idx===curIdx?'current':''}" data-idx="${idx}">
      <div class="opt-info">
        <div class="opt-name">${esc(f.name)}</div>
        <div class="opt-qty">${esc(f.qty)}</div>
        <div class="opt-macros">P ${fmtM(f.p)} · C ${fmtM(f.c)} · G ${fmtM(f.g)}</div>
        ${delta}
      </div>
      <div class="opt-kcal">${fmt(f.kcal)}</div>
    </div>`;
  }).join('');
  document.getElementById('sheet-body').querySelectorAll('.opt').forEach(el=>{
    el.addEventListener('click',()=>chooseSwap(parseInt(el.dataset.idx)));
  });
  document.getElementById('backdrop').classList.add('show');
  document.getElementById('sheet').classList.add('show');
}
function closeSwap(){
  document.getElementById('backdrop').classList.remove('show');
  document.getElementById('sheet').classList.remove('show');
  swapCtx=null;
}
function chooseSwap(idx){
  if(!swapCtx)return;
  if(!state.sel[currentDay]) state.sel[currentDay]={};
  state.sel[currentDay][swapCtx.key]=idx;
  save(); closeSwap(); render(); toast('Trocado!');
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove('show'),1500);
}

// ============ ACTIONS ============
function uncheckDay(){
  delete state.eat[currentDay]; save(); render(); toast('Desmarcado');
}
function resetDay(){
  if(!confirm('Voltar todas as refeições deste dia ao padrão? (suas trocas serão desfeitas)'))return;
  delete state.sel[currentDay]; save(); render(); toast('Refeições no padrão');
}

// ============ INIT ============
load();
document.getElementById('sheet-close').addEventListener('click',closeSwap);
document.getElementById('backdrop').addEventListener('click',closeSwap);
document.getElementById('btn-uncheck').addEventListener('click',uncheckDay);
document.getElementById('btn-reset').addEventListener('click',resetDay);
document.getElementById('water-add').addEventListener('click',addWater);
document.getElementById('water-remove').addEventListener('click',removeWater);
render();
</script>
